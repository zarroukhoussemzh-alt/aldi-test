name: Aldi Talk +1 GB Auto-Booker

on:
  schedule:
    - cron: '0 * * * *'    # Start once every hour (reliable)
  workflow_dispatch:         # Also allows manual runs from GitHub UI

jobs:
  book-gb:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Playwright
        run: |
          pip install playwright --quiet
          playwright install chromium
          playwright install-deps chromium

      - name: Run auto-booker
        env:
          ALDI_RUFNUMMER: ${{ secrets.ALDI_RUFNUMMER }}
          ALDI_PASSWORD: ${{ secrets.ALDI_PASSWORD }}
        run: python main.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
          if-no-files-found: ignore
